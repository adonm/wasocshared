# Link checking is split into deterministic local checks and scheduled external checks.
# CI runs offline against rendered Hugo HTML. The scheduled workflow also checks HTTP(S).
cache = true
max_cache_age = "1d"
max_redirects = 10
max_retries = 2
retry_wait_time = 2
timeout = 20
include_fragments = "full"
index_files = ["index.html"]
exclude_all_private = true
accept = ["100..=103", "200..=299", 403, 429]
exclude = [
  "^mailto:",
  "^tel:",
]
